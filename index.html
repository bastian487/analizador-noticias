<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Noticias Uruguay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #2c3e50;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 3rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 0.5rem;
        }

        .timestamp {
            font-size: 0.9rem;
            color: #888;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .metric-card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.1);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .metric-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .metric-label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 0.8rem;
            position: relative;
            z-index: 1;
        }

        .metric-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #667eea;
            position: relative;
            z-index: 1;
        }

        .section {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.1);
        }

        .section h2 {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .section h2 i {
            color: #667eea;
        }

        .heatmap {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
        }

        .topic-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #f0f4f8 100%);
            border-radius: 12px;
            padding: 1.2rem;
            border-left: 4px solid;
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
        }

        .topic-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .topic-box.intensity-high {
            border-left-color: #e74c3c;
        }

        .topic-box.intensity-medium {
            border-left-color: #f39c12;
        }

        .topic-box.intensity-low {
            border-left-color: #3498db;
        }

        .topic-name {
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: #2c3e50;
        }

        .topic-count {
            font-size: 1.8rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .topic-label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.8rem;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.6s ease;
        }

        .patterns-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .pattern-item {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .pattern-icon {
            color: #667eea;
            font-size: 1.3rem;
            flex-shrink: 0;
            margin-top: 0.2rem;
        }

        .pattern-text {
            color: #2c3e50;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .news-item {
            padding: 1.2rem;
            border-left: 4px solid #667eea;
            background: #f8f9fa;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .news-item:hover {
            background: #f0f4f8;
            transform: translateX(5px);
        }

        .news-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
        }

        .news-title {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.4rem;
            font-size: 1rem;
        }

        .news-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            color: #888;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            margin-top: 1rem;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .concentration-bar {
            display: flex;
            gap: 0.3rem;
            margin-top: 0.5rem;
        }

        .concentration-segment {
            height: 8px;
            border-radius: 4px;
            flex: 1;
        }

        .concentration-high {
            background: #e74c3c;
        }

        .concentration-medium {
            background: #f39c12;
        }

        .concentration-low {
            background: #3498db;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .section {
                padding: 1.5rem;
            }

            .heatmap {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-newspaper" style="margin-right: 0.5rem;"></i>Agenda de Noticias Uruguay</h1>
            <p>Análisis en tiempo real de patrones y tendencias mediáticas</p>
            <p class="timestamp" id="timestamp">Actualizando...</p>
        </div>

        <div class="metrics-grid" id="metricsContainer">
            <div class="metric-card">
                <div class="metric-label">Temas principales</div>
                <div class="metric-value" id="topicCount">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Tendencia principal</div>
                <div class="metric-value" id="mainTrend" style="font-size: 1.8rem;">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Concentración</div>
                <div class="metric-value" id="concentration" style="font-size: 1.8rem;">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Fuentes analizadas</div>
                <div class="metric-value">5</div>
            </div>
        </div>

        <div class="section">
            <h2><i class="fas fa-fire"></i>Intensidad temática</h2>
            <div class="heatmap" id="heatmap"></div>
        </div>

        <div class="section">
            <h2><i class="fas fa-chart-line"></i>Análisis de patrones</h2>
            <div class="patterns-list" id="patterns"></div>
        </div>

        <div class="section">
            <h2><i class="fas fa-star"></i>Noticias destacadas</h2>
            <div class="news-list" id="newsList"></div>
            <button class="refresh-btn" onclick="actualizarAnalisis()">
                <i class="fas fa-sync-alt"></i>Actualizar análisis
            </button>
        </div>
    </div>

    <script>
        // Datos de noticias simuladas de fuentes uruguayas
        const noticiasSimuladas = [
            { titulo: 'Gobierno anuncia plan de estabilización económica urgente', fuente: 'El País', tema: 'Política', hora: 'hace 25 min' },
            { titulo: 'Índice de inflación alcanza máximo del trimestre', fuente: 'La Diaria', tema: 'Economía', hora: 'hace 35 min' },
            { titulo: 'Ministerio de Economía presenta nuevas medidas fiscales', fuente: 'Subrayado', tema: 'Política', hora: 'hace 45 min' },
            { titulo: 'Sector financiero reporta volatilidad en mercados', fuente: '180', tema: 'Economía', hora: 'hace 55 min' },
            { titulo: 'Nuevas iniciativas de seguridad en capital', fuente: 'El Espectador', tema: 'Seguridad', hora: 'hace 1 hora' },
            { titulo: 'Reforma tributaria avanza en comisiones del legislativo', fuente: 'El País', tema: 'Política', hora: 'hace 1.5 horas' },
            { titulo: 'Desempleo mantiene tendencia al alza en región', fuente: 'La Diaria', tema: 'Economía', hora: 'hace 2 horas' },
            { titulo: 'Educación: nuevas directrices en curriculum escolar', fuente: 'Subrayado', tema: 'Educación', hora: 'hace 2.5 horas' },
            { titulo: 'Sector agropecuario pide intervención estatal', fuente: '180', tema: 'Economía', hora: 'hace 3 horas' },
            { titulo: 'Cambios en protocolo de atención sanitaria', fuente: 'El Espectador', tema: 'Salud', hora: 'hace 3.5 horas' }
        ];

        // Estructura de temas con colores y datos
        let analisisActual = null;

        async function actualizarAnalisis() {
            mostrarCargando(true);
            
            // Simular delay de análisis
            await new Promise(resolve => setTimeout(resolve, 1500));

            // Análisis de noticias
            const analisis = analizarNoticias(noticiasSimuladas);
            analisisActual = analisis;

            // Actualizar UI
            actualizarUI(analisis);
            mostrarCargando(false);
        }

        function analizarNoticias(noticias) {
            const temas = {};
            const fuentes = new Set();

            // Contar artículos por tema
            noticias.forEach(noticia => {
                temas[noticia.tema] = (temas[noticia.tema] || 0) + 1;
                fuentes.add(noticia.fuente);
            });

            // Convertir a array y ordenar
            const temasArray = Object.entries(temas)
                .map(([nombre, count]) => ({
                    nombre,
                    count,
                    intensidad: Math.round((count / noticias.length) * 100),
                    color: obtenerColorTema(nombre)
                }))
                .sort((a, b) => b.count - a.count);

            // Calcular concentración
            const concentracion = temasArray.length > 0 ? 
                ((temasArray[0].count + (temasArray[1]?.count || 0)) / noticias.length * 100) : 0;

            // Generar patrones
            const patrones = generarPatrones(temasArray, concentracion, noticias.length);

            return {
                temas: temasArray,
                tendenciaPrincipal: temasArray[0]?.nombre || 'N/A',
                concentracion: concentracion > 70 ? 'Alta' : concentracion > 40 ? 'Media' : 'Baja',
                concentracionValor: Math.round(concentracion),
                patrones,
                fuentesCount: fuentes.size,
                noticias
            };
        }

        function generarPatrones(temas, concentracion, totalNoticias) {
            const patrones = [];

            if (temas[0]) {
                const porcentaje = Math.round((temas[0].count / totalNoticias) * 100);
                patrones.push(`El tema "${temas[0].nombre}" domina con un ${porcentaje}% de la cobertura`);
            }

            if (concentracion > 70) {
                patrones.push('La agenda está altamente concentrada en 1-2 temas principales');
            } else if (concentracion > 40) {
                patrones.push('Agenda moderadamente concentrada con varios temas competentes');
            } else {
                patrones.push('Cobertura diversificada entre múltiples temas');
            }

            if (temas[1]) {
                patrones.push(`"${temas[1].nombre}" es el segundo tema en importancia, con ${temas[1].count} artículos`);
            }

            const temasMinoritarios = temas.slice(2);
            if (temasMinoritarios.length > 0) {
                patrones.push(`${temasMinoritarios.length} tema(s) adicional(es) con menor cobertura completlan la agenda`);
            }

            return patrones;
        }

        function obtenerColorTema(tema) {
            const colores = {
                'Política': '#667eea',
                'Economía': '#f39c12',
                'Seguridad': '#e74c3c',
                'Educación': '#27ae60',
                'Salud': '#9b59b6',
                'Tecnología': '#3498db',
                'Cultura': '#e67e22'
            };
            return colores[tema] || '#95a5a6';
        }

        function actualizarUI(analisis) {
            // Actualizar métricas
            document.getElementById('topicCount').textContent = analisis.temas.length;
            document.getElementById('mainTrend').textContent = analisis.tendenciaPrincipal;
            document.getElementById('concentration').textContent = analisis.concentracion;
            
            // Actualizar timestamp
            const ahora = new Date();
            document.getElementById('timestamp').textContent = 
                `Actualizado: ${ahora.toLocaleTimeString('es-UY', {hour: '2-digit', minute:'2-digit'})}`;

            // Heatmap de intensidad
            const heatmapHTML = analisis.temas.map((tema, idx) => `
                <div class="topic-box intensity-${tema.intensidad > 70 ? 'high' : tema.intensidad > 40 ? 'medium' : 'low'}">
                    <div class="topic-name">${tema.nombre}</div>
                    <div class="topic-count">${tema.count}</div>
                    <div class="topic-label">artículos (${tema.intensidad}%)</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${tema.intensidad}%; background: linear-gradient(90deg, ${tema.color} 0%, rgba(102,126,234,0.5) 100%);"></div>
                    </div>
                </div>
            `).join('');
            document.getElementById('heatmap').innerHTML = heatmapHTML;

            // Patrones
            const patternsHTML = analisis.patrones.map(patron => `
                <div class="pattern-item">
                    <i class="fas fa-arrow-right pattern-icon"></i>
                    <div class="pattern-text">${patron}</div>
                </div>
            `).join('');
            document.getElementById('patterns').innerHTML = patternsHTML;

            // Noticias
            const newsHTML = analisis.noticias.slice(0, 6).map(noticia => `
                <div class="news-item">
                    <span class="news-badge">${noticia.tema}</span>
                    <div class="news-title">${noticia.titulo}</div>
                    <div class="news-meta">
                        <span><i class="fas fa-newspaper"></i> ${noticia.fuente}</span>
                        <span><i class="fas fa-clock"></i> ${noticia.hora}</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('newsList').innerHTML = newsHTML;
        }

        function mostrarCargando(mostrar) {
            // Aquí podrías mostrar un spinner, pero con setTimeout es rápido
        }

        // Inicializar cuando carga la página
        window.addEventListener('DOMContentLoaded', () => {
            actualizarAnalisis();
        });
    </script>
</body>
</html>
